<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>G80 M3 Wash Plan</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#f0f1f4;--bg4:#e8eaef;--bg5:#dde0e8;
  --border:#dde0e8;--border2:#c8ccd8;--border3:#b0b5c5;
  --text:#0f1117;--text2:#4a4f65;--text3:#9098b0;
  --blue:#1358d4;--blue-lt:#1358d4;--blue-bg:rgba(19,88,212,0.07);--blue-bd:rgba(19,88,212,0.22);
  --green:#0a7a4a;--green-bg:rgba(10,122,74,0.07);--green-bd:rgba(10,122,74,0.22);
  --amber:#b06800;--amber-bg:rgba(176,104,0,0.07);--amber-bd:rgba(176,104,0,0.22);
  --red:#c0282a;--red-bg:rgba(192,40,42,0.07);--red-bd:rgba(192,40,42,0.22);
  --maint:#0a7a4a;--maint-bg:rgba(10,122,74,0.07);--maint-bd:rgba(10,122,74,0.22);
  --opt:#707898;--opt-bg:rgba(112,120,152,0.07);--opt-bd:rgba(112,120,152,0.2);
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;min-height:100vh;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.bmw-badge{width:36px;height:36px;border-radius:50%;border:2.5px solid #0f1117;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;position:relative;}
.bmw-badge::after{content:'';position:absolute;inset:0;border-radius:50%;border:2.5px solid #0f1117;}
.bq{width:100%;height:100%;}
.bq.bl{background:#1358d4;opacity:0.9;}
.bq.wh{background:#f8f8fc;opacity:1;}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-0.4px;color:var(--text);}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:1px;letter-spacing:0.02em;}
.ver{font-size:10px;background:var(--bg4);border:1px solid var(--border2);color:var(--text3);padding:3px 9px;border-radius:20px;letter-spacing:0.05em;font-weight:600;}
.mode-row{display:flex;gap:6px;padding:0 18px 14px;}
.mbtn{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.15s;letter-spacing:0.02em;font-weight:500;-webkit-tap-highlight-color:transparent;}
.mbtn i{font-size:13px;}
.mbtn.an{background:var(--blue-bg);color:var(--blue-lt);border-color:var(--blue-bd);}
.mbtn.am{background:var(--maint-bg);color:var(--maint);border-color:var(--maint-bd);}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 18px;border:none;background:transparent;color:var(--text3);font-size:11px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;letter-spacing:0.07em;font-weight:700;text-transform:uppercase;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.tab.active{color:var(--blue-lt);border-bottom-color:var(--blue-lt);}
.tab:hover:not(.active){color:var(--text2);}
.panel{display:none;padding:18px;}
.panel.active{display:block;}
.notice{border-radius:var(--r-sm);padding:11px 14px;font-size:12px;line-height:1.65;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;}
.notice i{font-size:14px;margin-top:1px;flex-shrink:0;}
.notice.ceramic{background:rgba(180,40,90,0.06);border:1px solid rgba(180,40,90,0.2);color:#a0304a;}
.notice.info{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
.notice.warn{background:var(--red-bg);border:1px solid var(--red-bd);color:#d07070;}
.notice.opt-notice{background:var(--maint-bg);border:1px solid var(--maint-bd);color:var(--maint);}
.prog-wrap{margin-bottom:14px;}
.prog-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.prog-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);}
.prog-ct{font-size:14px;font-weight:700;color:var(--text);}
.prog-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue) 0%,#0a9a5a 100%);border-radius:2px;transition:width 0.4s cubic-bezier(.4,0,.2,1);}
.rbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;padding:5px 12px;border-radius:20px;cursor:pointer;margin-bottom:14px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;-webkit-tap-highlight-color:transparent;}
.rbtn:hover{color:var(--text2);border-color:var(--border3);}
.rbtn i{font-size:12px;}
.steps-list{display:flex;flex-direction:column;gap:6px;}
.step{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;display:flex;align-items:flex-start;gap:13px;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.step::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.step.ns::before{background:var(--blue);opacity:0.7;}
.step.ms::before{background:var(--maint);opacity:0.85;}
.step.os::before{background:var(--opt);opacity:0.5;}
.step:hover{border-color:var(--border3);background:var(--bg3);}
.step.done{opacity:0.38;}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0;}
.step.done .step-n{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.step-b{flex:1;min-width:0;}
.step-t{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;line-height:1.35;letter-spacing:-0.1px;}
.step-d{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:7px;}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.tag.tl{background:var(--blue-bg);color:var(--blue-lt);border:1px solid var(--blue-bd);}
.tag.tc{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
.tag.tw{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;display:inline-block;}
.pill.pn{background:var(--blue-bg);color:var(--blue-lt);border:1px solid var(--blue-bd);}
.pill.pm{background:var(--maint-bg);color:var(--maint);border:1px solid var(--maint-bd);}
.pill.po{background:var(--opt-bg);color:var(--opt);border:1px solid var(--opt-bd);}
.pill.pe{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.pill.pr{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
.slbl:first-child{margin-top:0;}
.slbl::after{content:'';flex:1;height:1px;background:var(--border);}
.chem-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.chem-hd{background:var(--bg3);padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.chem-nm{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-0.1px;}
.chem-cat{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.chem-bd{padding:12px 14px;}
.chem-used{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.55;}
.dil{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:6px;}
.dil:last-of-type{margin-bottom:0;}
.dil-ctx{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;font-weight:600;}
.dil-ratio{font-size:20px;font-weight:800;color:var(--blue-lt);letter-spacing:-0.8px;line-height:1.1;}
.dil-amt{font-size:12px;color:var(--text);margin-top:3px;font-weight:500;}
.dil-note{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.55;}
.chem-tool{font-size:11px;color:var(--text3);margin-top:10px;display:flex;align-items:flex-start;gap:6px;line-height:1.5;}
.chem-tool i{font-size:13px;margin-top:1px;flex-shrink:0;}
.tbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.tr{display:grid;border-bottom:1px solid var(--border);}
.tr:last-child{border-bottom:none;}
.tr.th{background:var(--bg3);}
.tc2{grid-template-columns:1.6fr 0.55fr 1.45fr;}
.tc4{grid-template-columns:1.1fr 0.95fr 0.85fr 1.1fr;}
.td{padding:9px 13px;font-size:12px;color:var(--text);line-height:1.45;}
.td.m{color:var(--text2);}
.tr.th .td{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);padding:7px 13px;}
.gsm{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.gs{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 8px;text-align:center;}
.gsn{font-size:26px;font-weight:800;display:block;letter-spacing:-1px;}
.gsl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;font-weight:600;}
.gap-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;}
.gap-item.have{border-color:var(--green-bd);background:var(--green-bg);}
.gap-item.buy{border-color:var(--amber-bd);background:var(--amber-bg);}
.gap-item.skip{opacity:0.35;}
.gap-nm{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.gap-item.have .gap-nm{color:var(--green);}
.gap-item.buy .gap-nm{color:var(--amber);}
.gap-why{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:9px;}
.gap-item.have .gap-why{color:rgba(0,204,120,0.55);}
.gap-item.buy .gap-why{color:rgba(240,160,32,0.6);}
.gap-btns{display:flex;gap:6px;flex-wrap:wrap;}
.gap-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-weight:600;letter-spacing:0.03em;-webkit-tap-highlight-color:transparent;}
.gap-btn.sh{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.gap-btn.sb{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);}
.gap-btn.ss{background:var(--bg4);color:var(--text3);}
.fbrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fbtn{font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.fbtn.active{background:var(--bg4);color:var(--text);border-color:var(--border3);}
.eng-warn{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;}
.eng-warn-t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.09em;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.cvr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cvr{border-radius:var(--r-sm);padding:10px 12px;}
.cvr.danger{background:rgba(240,72,72,0.07);border:1px solid var(--red-bd);}
.cvr.caution{background:rgba(240,160,32,0.07);border:1px solid var(--amber-bd);}
.cvr-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
.cvr.danger .cvr-lbl{color:var(--red);}
.cvr.caution .cvr-lbl{color:var(--amber);}
.cvr-items{font-size:12px;color:var(--text2);line-height:1.75;}
.sl-header{margin-bottom:18px;}
.sl-title{display:block;font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.2px;}
.sl-sub{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;font-weight:500;}
.sl-list{display:flex;flex-direction:column;gap:2px;}
.sl-item{display:flex;align-items:baseline;gap:14px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.sl-item:last-child{border-bottom:none;}
.sl-num{font-size:12px;font-weight:700;color:var(--text3);width:22px;flex-shrink:0;text-align:right;font-variant-numeric:tabular-nums;}
.sl-text{font-size:14px;color:var(--text);line-height:1.4;flex:1;}
.sl-note{font-size:12px;color:var(--text2);font-weight:400;}
.loading{text-align:center;padding:80px 20px;color:var(--text3);font-size:14px;}
.error-box{margin:20px;background:var(--bg2);border:1px solid var(--red-bd);border-radius:var(--r);padding:24px;}
.error-box h2{font-size:16px;color:var(--red);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.error-box p{font-size:13px;color:var(--text2);line-height:1.7;}
.error-box code{background:var(--bg4);padding:3px 8px;border-radius:4px;font-size:12px;color:var(--text);font-family:'SF Mono',monospace;}
@media(max-width:420px){.cvr-grid{grid-template-columns:1fr;}.gsm{grid-template-columns:repeat(2,1fr);}.hdr-top{padding:12px 14px 10px;}.panel{padding:14px;}}
</style>
</head>
<body>
<div id="app"><div class="loading"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:10px;"></i>Loading wash plan…</div></div>
<script>
var DATA=null,mode='normal',done=new Set(),engDone=new Set(),intDone=new Set(),gapState={},gapFilter='all',activeTab='steps';
try{done=new Set(JSON.parse(localStorage.getItem('gwp_done')||'[]'));}catch(e){}
try{engDone=new Set(JSON.parse(localStorage.getItem('gwp_eng')||'[]'));}catch(e){}
try{intDone=new Set(JSON.parse(localStorage.getItem('gwp_int')||'[]'));}catch(e){}
try{gapState=JSON.parse(localStorage.getItem('gwp_gaps')||'{}');}catch(e){}
function save(){try{localStorage.setItem('gwp_done',JSON.stringify([...done]));localStorage.setItem('gwp_eng',JSON.stringify([...engDone]));localStorage.setItem('gwp_int',JSON.stringify([...intDone]));localStorage.setItem('gwp_gaps',JSON.stringify(gapState));}catch(e){}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){document.getElementById('app').innerHTML=renderHeader()+renderTabs()+renderPanels();}
function renderHeader(){var m=DATA.meta;return'<div class="hdr"><div class="hdr-top"><div class="hdr-left"><div class="bmw-badge"><div class="bq bl"></div><div class="bq wh"></div><div class="bq wh"></div><div class="bq bl"></div></div><div><div class="hdr-title">'+esc(m.title)+'</div><div class="hdr-sub">'+esc(m.car)+'</div></div></div><div class="ver">v'+esc(m.version)+'</div></div><div class="mode-row"><button class="mbtn '+(mode==='normal'?'an':'')+'" onclick="setMode(\'normal\')"><i class="ti ti-droplet" aria-hidden="true"></i>Bi-weekly wash</button><button class="mbtn '+(mode==='maint'?'am':'')+'" onclick="setMode(\'maint\')"><i class="ti ti-shield-check" aria-hidden="true"></i>Ceramic maintenance</button></div></div>';}
function renderTabs(){return'<div class="tabs">'+[{id:'steps',l:'Steps'},{id:'chems',l:'Chemicals'},{id:'tools',l:'Tools'},{id:'engine',l:'Engine Bay'},{id:'interior',l:'Interior'},
    {id:'shortlist',l:'ShortList'},{id:'gaps',l:'Gaps'}].map(function(t){return'<button class="tab'+(activeTab===t.id?' active':'')+'" onclick="showTab(\''+t.id+'\')">'+t.l+'</button>';}).join('')+'</div>';}
function renderPanels(){return['steps','chems','tools','engine','interior','shortlist','gaps'].map(function(id){var fn={steps:renderSteps,chems:renderChems,tools:renderTools,engine:renderEngine,interior:renderInterior,shortlist:renderShortList,gaps:renderGaps}[id];return'<div class="panel'+(activeTab===id?' active':'')+'" id="panel-'+id+'">'+fn()+'</div>';}).join('');}
function getVis(){var n=DATA.washSteps.normal;if(mode==='normal')return n;var f=n.filter(function(s){return!s.normalOnly;});var c=f.slice();DATA.washSteps.maintOnly.forEach(function(ms){var i=c.findIndex(function(s){return s.id===ms.insertAfter;});var e=Object.assign({},ms,{isMaint:true});if(i>=0)c.splice(i+1,0,e);else c.push(e);});return c;}
function renderSteps(){var steps=getVis();var n=steps.filter(function(s){return done.has(s.id);}).length;var t=steps.length;var pct=t>0?Math.round(n/t*100):0;var html='<div class="notice ceramic"><i class="ti ti-shield-half" aria-hidden="true"></i><span><strong>Ceramic coat rules:</strong> pH-neutral shampoos only. No wax or sealant over ceramic. Touchless leaf blower drying — zero towel contact on paint after rinsing.</span></div>';html+='<div class="prog-wrap"><div class="prog-meta"><span class="prog-lbl">Progress</span><span class="prog-ct">'+n+' / '+t+'</span></div><div class="prog-track"><div class="prog-bar" id="prog-bar" style="width:'+pct+'%"></div></div></div>';html+='<button class="rbtn" onclick="resetSteps()"><i class="ti ti-refresh" aria-hidden="true"></i>Reset all</button>';html+='<div class="steps-list">';steps.forEach(function(s,idx){var isDone=done.has(s.id);var cls='step '+(s.isMaint?'ms':s.optional?'os':'ns')+(isDone?' done':'');var mb=s.isMaint?'<span class="pill pm">maint.</span>':'';var ob=s.optional?'<span class="pill po">optional</span>':'';html+='<div class="'+cls+'" onclick="toggleStep(\''+s.id+'\')"><div class="step-n">'+(isDone?'<i class="ti ti-check" style="font-size:13px;color:var(--green)"></i>':(idx+1))+'</div><div class="step-b"><div class="step-t">'+esc(s.title)+mb+ob+'</div><div class="step-d">'+esc(s.desc)+'</div>';if((s.tools&&s.tools.length)||(s.chems&&s.chems.length)){html+='<div class="tags">';(s.tools||[]).forEach(function(t){html+='<span class="tag tl"><i class="ti ti-tool" aria-hidden="true" style="font-size:10px;margin-right:3px;"></i>'+esc(t)+'</span>';});(s.chems||[]).forEach(function(c){html+='<span class="tag tc"><i class="ti ti-flask" aria-hidden="true" style="font-size:10px;margin-right:3px;"></i>'+esc(c)+'</span>';});html+='</div>';}html+='</div></div>';});html+='</div>';return html;}

[]).forEach(function(t){html+='<span class="tag tl"><i class="ti ti-tool" aria-hidden="true" style="font-size:10px;margin-right:3px;"></i>'+esc(t)+'</span>';});(s.chems||[]).forEach(function(c){html+='<span class="tag tc"><i class="ti ti-flask" aria-hidden="true" style="font-size:10px;margin-right:3px;"></i>'+esc(c)+'</span>';});html+='</div>';}html+='</div></div>';});html+='</div>';html+='<div class="slbl" style="margin-top:20px;">Engine bay chemicals</div><div class="tbl"><div class="tr tc4 th"><div class="td">Chemical</div><div class="td">Where used</div><div class="td">Dilution</div><div class="td">Tool / notes</div></div><div class="tr tc4"><div class="td">AllClean APC or CarPro MultiX</div><div class="td m">All plastics, hoses, bay walls, chassis</div><div class="td m">AllClean 5:1–10:1 / MultiX 10:1 general. 3:1 heavy grease.</div><div class="td m">IK E Foam 2 or spray bottle + detail brushes. Dwell 1–2 min.</div></div><div class="tr tc4"><div class="td">Trim dressing</div><div class="td m">Plastic covers, hoses, rubber seals</div><div class="td m">RTU</div><div class="td m">Soft trim brush or foam pad. Apply thin near connectors.</div></div></div>';return html;}

      (s.chems||[]).forEach(function(c){stepHtml+='<span class="tag tc"><i class="ti ti-flask" aria-hidden="true" style="font-size:10px;margin-right:3px;"></i>'+esc(c)+'</span>';});

function toggleInterior(el,id){
  if(intDone.has(id))intDone.delete(id);else intDone.add(id);
  save();
  var steps=DATA.interiorDetail.steps;
  var n=steps.filter(function(s){return intDone.has(s.id);}).length;
  var t=steps.length;
  var pct=t>0?Math.round(n/t*100):0;
  var bar=document.getElementById('int-bar');
  if(bar)bar.style.width=pct+'%';
  var ct=document.querySelector('#panel-interior .prog-ct');
  if(ct)ct.textContent=n+' / '+t;
  steps.forEach(function(s,idx){
    var stepEl=document.getElementById('int-step-'+s.id);
    if(!stepEl)return;
    var isDone=intDone.has(s.id);
    stepEl.className='step ns'+(isDone?' done':'')+(s.optional?' os':'');
    var nn=stepEl.querySelector('.step-n');
    if(nn)nn.innerHTML=isDone?'<i class="ti ti-check" style="font-size:13px;color:var(--green)"></i>':(idx+1);
  });
}
